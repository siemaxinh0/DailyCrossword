<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Codzienna Krzyżówka</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="paper">
    <header class="masthead">
      <div class="mast-left">
        <div class="issue" id="issue">№ —</div>
        <div class="date" id="date">— — —</div>
      </div>
      <h1 class="title">
        <span>Codzienna</span>
        <em>Krzyżówka</em>
      </h1>
      <div class="mast-right">
        <button class="icon-btn" id="openCalendar" title="Archiwum" aria-label="Otwórz kalendarz">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="square">
            <rect x="3.5" y="5.5" width="17" height="15"/>
            <path d="M3.5 10h17M8 3v5M16 3v5"/>
          </svg>
          <span>Archiwum</span>
        </button>
      </div>
    </header>

    <hr class="rule double" />

    <main class="layout">
      <aside class="rail rail-left">
        <div class="rail-label">Hasła poziomo</div>
        <ol id="cluesAcross" class="clue-list"></ol>
      </aside>

      <section class="stage">
        <div class="grid-wrap">
          <div id="grid" class="grid" role="grid" aria-label="Plansza krzyżówki"></div>
          <div id="mediaPanel" class="media-panel" hidden></div>
        </div>

        <div class="actions">
          <button id="checkBtn" class="primary">Sprawdź odpowiedzi</button>
          <button id="resetBtn" class="ghost">Wyczyść</button>
        </div>
        <div id="result" class="result" hidden></div>
      </section>

      <aside class="rail rail-right">
        <div class="rail-label">Hasła pionowo</div>
        <ol id="cluesDown" class="clue-list"></ol>
      </aside>
    </main>

    <footer class="colophon">
      <span>Edycja codzienna · nowa łamigłówka o północy</span>
      <a href="/admin.html" class="quiet">redakcja</a>
    </footer>
  </div>

  <!-- Media lightbox -->
  <div id="mediaModal" class="modal" hidden>
    <div class="modal-card media-modal-card">
      <header class="modal-head">
        <h2 id="mediaModalTitle">Materiał</h2>
        <button class="icon-btn ghost" id="closeMedia" aria-label="Zamknij">×</button>
      </header>
      <div id="mediaModalClue" class="mp-clue"></div>
      <div id="mediaModalBody" class="media-modal-body"></div>
    </div>
  </div>

  <!-- Calendar modal -->
  <div id="calendarModal" class="modal" hidden>
    <div class="modal-card">
      <header class="modal-head">
        <h2>Archiwum</h2>
        <button class="icon-btn ghost" id="closeCalendar" aria-label="Zamknij">×</button>
      </header>
      <div class="calendar">
        <div class="cal-nav">
          <button id="calPrev" class="icon-btn ghost" aria-label="Poprzedni miesiąc">‹</button>
          <div id="calLabel" class="cal-label"></div>
          <button id="calNext" class="icon-btn ghost" aria-label="Następny miesiąc">›</button>
        </div>
        <div class="cal-weekdays">
          <span>Pn</span><span>Wt</span><span>Śr</span><span>Cz</span><span>Pt</span><span>So</span><span>Nd</span>
        </div>
        <div id="calGrid" class="cal-grid"></div>
        <div class="cal-legend">
          <span class="dot dot-played"></span> rozwiązane
          <span class="dot dot-available"></span> dostępne
          <span class="dot dot-locked"></span> przyszłe
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
